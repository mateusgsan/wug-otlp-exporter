# SonarCloud project configuration
# https://sonarcloud.io/documentation/analysis/scan/sonarscanner/

sonar.projectKey=mateusgsan_wug-otlp-exporter
sonar.organization=mateusgsan

# Project metadata
sonar.projectName=wug-otlp-exporter
sonar.projectVersion=1.2

# Source and test paths
sonar.sources=.
sonar.inclusions=wug_otlp_exporter.py
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python language
sonar.language=py
sonar.python.version=3.14

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
# NOTE: sonar.qualitygate.wait=true requires a baseline analysis to compare "new code"
# On the Free plan, the first analysis has no baseline, causing status=NONE (treated as FAILED)
# The quality gate is enforced via the workflow step below using the SonarCloud API directly
sonar.qualitygate.wait=false

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.env*,**/node_modules/**,**/.github/**,**/Dockerfile,**/*.yml,**/*.yaml,**/*.txt,**/*.md,**/*.json

# Issue thresholds (used in Quality Gate)
# New code: 0 bugs, 0 vulnerabilities, 0 security hotspots unreviewed
# Coverage on new code: >= 80%
# Duplications on new code: <= 3%
