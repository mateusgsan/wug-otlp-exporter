name: DORA Metrics
# This workflow collects the four DORA (DevOps Research and Assessment) metrics:
#
#   1. Deployment Frequency   - triggered on every successful deploy to main
#   2. Lead Time for Changes  - time from first commit to production deploy
#   3. Change Failure Rate    - ratio of incidents vs deploys (via GitHub Issues)
#   4. Mean Time to Restore   - time to close incidents tagged as "incident"
#
# All metrics are stored as GitHub Actions Step Summaries and as structured
# JSON artifacts for integration with external dashboards (Grafana, etc.).

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  issues:
    types: [opened, closed, labeled]

jobs:
  # ─────────────────────────────────────────────────────────────
  # METRIC 1 & 2: Deployment Frequency + Lead Time for Changes
  # Triggered on every push to main (= production deploy event)
  # ─────────────────────────────────────────────────────────────
  deployment-frequency-and-lead-time:
    name: Deployment Frequency & Lead Time
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Calculate Deployment Frequency & Lead Time
      id: dora
      run: |
        SINCE=$(date -d '30 days ago' --iso-8601=seconds)
        DEPLOY_COUNT=$(git log --oneline --after="$SINCE" origin/main 2>/dev/null | wc -l)
        DEPLOY_FREQ=$(echo "scale=2; $DEPLOY_COUNT / 30" | bc)

        FIRST_COMMIT_TS=$(git log --pretty=format:"%ct" | tail -1)
        NOW_TS=$(date +%s)
        LEAD_TIME_SECS=$(( NOW_TS - FIRST_COMMIT_TS ))
        LEAD_TIME_HOURS=$(echo "scale=2; $LEAD_TIME_SECS / 3600" | bc)
        LEAD_TIME_DAYS=$(echo "scale=2; $LEAD_TIME_SECS / 86400" | bc)

        if (( $(echo "$DEPLOY_FREQ >= 1" | bc -l) )); then
          DF_RATING="Elite (>= 1/day)"
        elif (( $(echo "$DEPLOY_FREQ >= 0.142" | bc -l) )); then
          DF_RATING="High (>= 1/week)"
        elif (( $(echo "$DEPLOY_FREQ >= 0.033" | bc -l) )); then
          DF_RATING="Medium (>= 1/month)"
        else
          DF_RATING="Low (< 1/month)"
        fi

        if (( $(echo "$LEAD_TIME_HOURS <= 24" | bc -l) )); then
          LT_RATING="Elite (< 1 day)"
        elif (( $(echo "$LEAD_TIME_HOURS <= 168" | bc -l) )); then
          LT_RATING="High (< 1 week)"
        elif (( $(echo "$LEAD_TIME_HOURS <= 720" | bc -l) )); then
          LT_RATING="Medium (< 1 month)"
        else
          LT_RATING="Low (> 1 month)"
        fi

        COMMIT_SHA="${{ github.sha }}"
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        DEPLOY_TIME=$(date --iso-8601=seconds)

        echo "deploy_count=$DEPLOY_COUNT"       >> "$GITHUB_OUTPUT"
        echo "deploy_freq=$DEPLOY_FREQ"         >> "$GITHUB_OUTPUT"
        echo "lead_time_hours=$LEAD_TIME_HOURS" >> "$GITHUB_OUTPUT"
        echo "lead_time_days=$LEAD_TIME_DAYS"   >> "$GITHUB_OUTPUT"
        echo "deploy_time=$DEPLOY_TIME"         >> "$GITHUB_OUTPUT"
        echo "commit_sha=$COMMIT_SHA"           >> "$GITHUB_OUTPUT"
        echo "commit_msg=$COMMIT_MSG"           >> "$GITHUB_OUTPUT"
        echo "df_rating=$DF_RATING"             >> "$GITHUB_OUTPUT"
        echo "lt_rating=$LT_RATING"             >> "$GITHUB_OUTPUT"

    - name: Save deployment metrics artifact
      run: |
        mkdir -p dora-artifacts
        DEPLOY_COUNT="${{ steps.dora.outputs.deploy_count }}"
        DEPLOY_FREQ="${{ steps.dora.outputs.deploy_freq }}"
        LT_HOURS="${{ steps.dora.outputs.lead_time_hours }}"
        LT_DAYS="${{ steps.dora.outputs.lead_time_days }}"
        DF_RATING="${{ steps.dora.outputs.df_rating }}"
        LT_RATING="${{ steps.dora.outputs.lt_rating }}"
        COMMIT="${{ steps.dora.outputs.commit_sha }}"
        COMMIT_MSG="${{ steps.dora.outputs.commit_msg }}"
        DEPLOY_TIME="${{ steps.dora.outputs.deploy_time }}"
        REPO="${{ github.repository }}"
        BRANCH="${{ github.ref_name }}"
        cat > dora-artifacts/deployment-metrics.json << JSONEOF
        {
          "timestamp": "${DEPLOY_TIME}",
          "commit": "${COMMIT}",
          "commit_message": "${COMMIT_MSG}",
          "repository": "${REPO}",
          "branch": "${BRANCH}",
          "dora": {
            "deployment_frequency": {
              "deploys_last_30d": ${DEPLOY_COUNT},
              "deploys_per_day": ${DEPLOY_FREQ},
              "rating": "${DF_RATING}"
            },
            "lead_time_for_changes": {
              "hours": ${LT_HOURS},
              "days": ${LT_DAYS},
              "rating": "${LT_RATING}"
            }
          }
        }
        JSONEOF

    - name: Upload deployment metrics artifact
      uses: actions/upload-artifact@v4
      with:
        name: dora-deployment-metrics-${{ github.run_id }}
        path: dora-artifacts/
        retention-days: 90

    - name: Write DORA Step Summary
      run: |
        {
          echo "## DORA Metrics"
          echo ""
          echo "| Metric | Value | Rating |"
          echo "| :--- | :--- | :--- |"
          echo "| **Deployment Frequency** | ${{ steps.dora.outputs.deploy_count }} deploys / 30 days (${{ steps.dora.outputs.deploy_freq }}/day) | ${{ steps.dora.outputs.df_rating }} |"
          echo "| **Lead Time for Changes** | ${{ steps.dora.outputs.lead_time_hours }} hours (${{ steps.dora.outputs.lead_time_days }} days) | ${{ steps.dora.outputs.lt_rating }} |"
          echo ""
          echo "> Commit: \`${{ steps.dora.outputs.commit_sha }}\` — ${{ steps.dora.outputs.commit_msg }}"
          echo ""
          echo "> _Change Failure Rate and MTTR are calculated when issues labeled 'incident' are opened or closed._"
        } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # METRIC 3 & 4: Change Failure Rate + Mean Time to Restore
  # Triggered when an issue is opened/closed/labeled as "incident"
  # ─────────────────────────────────────────────────────────────
  failure-rate-and-mttr:
    name: Change Failure Rate & MTTR
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Calculate Change Failure Rate & MTTR
      id: reliability
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        REPO="${{ github.repository }}"
        SINCE=$(date -d '30 days ago' --iso-8601=seconds)

        gh issue list \
          --repo "$REPO" \
          --label "incident" \
          --state all \
          --json number,title,createdAt,closedAt,state \
          --limit 100 > /tmp/incidents.json 2>/dev/null || echo "[]" > /tmp/incidents.json

        TOTAL_DEPLOYS=$(git log --oneline --after="$SINCE" origin/main 2>/dev/null | wc -l)

        METRICS=$(TOTAL_DEPLOYS="$TOTAL_DEPLOYS" python3 scripts/dora_mttr.py < /tmp/incidents.json)

        MTTR_HOURS=$(echo "$METRICS" | grep "^mttr_hours=" | cut -d= -f2)
        CFR=$(echo "$METRICS" | grep "^cfr_percent=" | cut -d= -f2)
        CFR_RATING=$(echo "$METRICS" | grep "^cfr_rating=" | cut -d= -f2-)
        MTTR_RATING=$(echo "$METRICS" | grep "^mttr_rating=" | cut -d= -f2-)
        CLOSED=$(echo "$METRICS" | grep "^closed_incidents=" | cut -d= -f2)
        TOTAL_INC=$(echo "$METRICS" | grep "^total_incidents=" | cut -d= -f2)

        echo "mttr_hours=$MTTR_HOURS"       >> "$GITHUB_OUTPUT"
        echo "cfr=$CFR"                     >> "$GITHUB_OUTPUT"
        echo "cfr_rating=$CFR_RATING"       >> "$GITHUB_OUTPUT"
        echo "mttr_rating=$MTTR_RATING"     >> "$GITHUB_OUTPUT"
        echo "closed=$CLOSED"               >> "$GITHUB_OUTPUT"
        echo "total_inc=$TOTAL_INC"         >> "$GITHUB_OUTPUT"
        echo "total_deploys=$TOTAL_DEPLOYS" >> "$GITHUB_OUTPUT"

    - name: Save reliability metrics artifact
      run: |
        mkdir -p dora-artifacts
        CFR="${{ steps.reliability.outputs.cfr }}"
        CFR_RATING="${{ steps.reliability.outputs.cfr_rating }}"
        MTTR="${{ steps.reliability.outputs.mttr_hours }}"
        MTTR_RATING="${{ steps.reliability.outputs.mttr_rating }}"
        TOTAL_INC="${{ steps.reliability.outputs.total_inc }}"
        TOTAL_DEP="${{ steps.reliability.outputs.total_deploys }}"
        CLOSED="${{ steps.reliability.outputs.closed }}"
        REPO="${{ github.repository }}"
        TS=$(date --iso-8601=seconds)
        cat > dora-artifacts/reliability-metrics.json << JSONEOF
        {
          "timestamp": "${TS}",
          "repository": "${REPO}",
          "dora": {
            "change_failure_rate": {
              "total_incidents_30d": ${TOTAL_INC},
              "total_deploys_30d": ${TOTAL_DEP},
              "rate_percent": ${CFR},
              "rating": "${CFR_RATING}"
            },
            "mean_time_to_restore": {
              "hours": ${MTTR},
              "closed_incidents": ${CLOSED},
              "rating": "${MTTR_RATING}"
            }
          }
        }
        JSONEOF

    - name: Upload reliability artifact
      uses: actions/upload-artifact@v4
      with:
        name: dora-reliability-metrics-${{ github.run_id }}
        path: dora-artifacts/
        retention-days: 90

    - name: Write Reliability Step Summary
      run: |
        {
          echo "## DORA Metrics — Reliability"
          echo ""
          echo "| Metric | Value | Rating |"
          echo "| :--- | :--- | :--- |"
          echo "| **Change Failure Rate** | ${{ steps.reliability.outputs.cfr }}% (${{ steps.reliability.outputs.total_inc }} incidents / ${{ steps.reliability.outputs.total_deploys }} deploys) | ${{ steps.reliability.outputs.cfr_rating }} |"
          echo "| **Mean Time to Restore** | ${{ steps.reliability.outputs.mttr_hours }} hours | ${{ steps.reliability.outputs.mttr_rating }} |"
        } >> "$GITHUB_STEP_SUMMARY"
