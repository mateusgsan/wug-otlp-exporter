name: DORA Metrics

# This workflow collects the four DORA (DevOps Research and Assessment) metrics:
#
#   1. Deployment Frequency   – triggered on every successful deploy to main
#   2. Lead Time for Changes  – time from first commit to production deploy
#   3. Change Failure Rate    – ratio of failed deployments (tracked via GitHub Issues)
#   4. Mean Time to Restore   – time to close incidents tagged as "incident"
#
# All metrics are stored as GitHub Actions job summaries and as structured
# JSON artifacts for integration with external dashboards (Grafana, DataDog, etc.).

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  issues:
    types: [opened, closed, labeled]

jobs:
  # ─────────────────────────────────────────────────────────────
  # METRIC 1 & 2: Deployment Frequency + Lead Time for Changes
  # Triggered on every push to main (= production deploy event)
  # ─────────────────────────────────────────────────────────────
  deployment-frequency-and-lead-time:
    name: Deployment Frequency & Lead Time
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history required to calculate lead time

    - name: Calculate DORA metrics
      id: dora
      run: |
        # ── Deployment Frequency ──────────────────────────────────
        # Count deploys (pushes to main) in the last 30 days
        SINCE=$(date -d '30 days ago' --iso-8601=seconds)
        DEPLOY_COUNT=$(git log --oneline --after="$SINCE" origin/main 2>/dev/null | wc -l)
        DEPLOY_FREQ=$(echo "scale=2; $DEPLOY_COUNT / 30" | bc)

        # ── Lead Time for Changes ─────────────────────────────────
        # Time between the oldest commit in this push and now
        FIRST_COMMIT_TS=$(git log --pretty=format:"%ct" | tail -1)
        NOW_TS=$(date +%s)
        LEAD_TIME_SECS=$(( NOW_TS - FIRST_COMMIT_TS ))
        LEAD_TIME_HOURS=$(echo "scale=2; $LEAD_TIME_SECS / 3600" | bc)
        LEAD_TIME_DAYS=$(echo "scale=2; $LEAD_TIME_SECS / 86400" | bc)

        # ── Current commit info ───────────────────────────────────
        COMMIT_SHA="${{ github.sha }}"
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        DEPLOY_TIME=$(date --iso-8601=seconds)

        echo "deploy_count=$DEPLOY_COUNT"       >> $GITHUB_OUTPUT
        echo "deploy_freq=$DEPLOY_FREQ"         >> $GITHUB_OUTPUT
        echo "lead_time_hours=$LEAD_TIME_HOURS" >> $GITHUB_OUTPUT
        echo "lead_time_days=$LEAD_TIME_DAYS"   >> $GITHUB_OUTPUT
        echo "deploy_time=$DEPLOY_TIME"         >> $GITHUB_OUTPUT
        echo "commit_sha=$COMMIT_SHA"           >> $GITHUB_OUTPUT
        echo "commit_msg=$COMMIT_MSG"           >> $GITHUB_OUTPUT

    - name: Save DORA metrics artifact
      run: |
        mkdir -p dora-artifacts
        cat > dora-artifacts/deployment-metrics.json << EOF
        {
          "timestamp": "${{ steps.dora.outputs.deploy_time }}",
          "commit": "${{ steps.dora.outputs.commit_sha }}",
          "commit_message": "${{ steps.dora.outputs.commit_msg }}",
          "repository": "${{ github.repository }}",
          "branch": "${{ github.ref_name }}",
          "dora": {
            "deployment_frequency": {
              "deploys_last_30_days": ${{ steps.dora.outputs.deploy_count }},
              "deploys_per_day": ${{ steps.dora.outputs.deploy_freq }},
              "rating": "$([ $(echo "${{ steps.dora.outputs.deploy_freq }} >= 1" | bc -l) -eq 1 ] && echo 'Elite' || echo 'High')"
            },
            "lead_time_for_changes": {
              "hours": ${{ steps.dora.outputs.lead_time_hours }},
              "days": ${{ steps.dora.outputs.lead_time_days }},
              "rating": "$([ $(echo "${{ steps.dora.outputs.lead_time_hours }} <= 24" | bc -l) -eq 1 ] && echo 'Elite' || echo 'High')"
            }
          }
        }
        EOF

    - name: Upload DORA artifact
      uses: actions/upload-artifact@v4
      with:
        name: dora-deployment-metrics-${{ github.sha }}
        path: dora-artifacts/
        retention-days: 90

    - name: Write Job Summary
      run: |
        echo "## DORA Metrics — Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value | Rating |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Deployment Frequency** | ${{ steps.dora.outputs.deploy_count }} deploys / 30 days (${{ steps.dora.outputs.deploy_freq }}/day) | $([ $(echo "${{ steps.dora.outputs.deploy_freq }} >= 1" | bc -l) -eq 1 ] && echo '🟢 Elite' || echo '🟡 High') |" >> $GITHUB_STEP_SUMMARY
        echo "| **Lead Time for Changes** | ${{ steps.dora.outputs.lead_time_hours }} hours (${{ steps.dora.outputs.lead_time_days }} days) | $([ $(echo "${{ steps.dora.outputs.lead_time_hours }} <= 24" | bc -l) -eq 1 ] && echo '🟢 Elite' || echo '🟡 High') |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Commit: \`${{ steps.dora.outputs.commit_sha }}\` — ${{ steps.dora.outputs.commit_msg }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # METRIC 3 & 4: Change Failure Rate + Mean Time to Restore
  # Triggered when an issue is opened/closed/labeled as "incident"
  # ─────────────────────────────────────────────────────────────
  failure-rate-and-mttr:
    name: Change Failure Rate & MTTR
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Calculate Change Failure Rate & MTTR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        REPO="${{ github.repository }}"

        # ── Fetch incidents (issues labeled "incident") ───────────
        INCIDENTS=$(gh issue list \
          --repo "$REPO" \
          --label "incident" \
          --state all \
          --json number,title,createdAt,closedAt,state \
          --limit 100 2>/dev/null || echo "[]")

        TOTAL_INCIDENTS=$(echo "$INCIDENTS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))")
        CLOSED_INCIDENTS=$(echo "$INCIDENTS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([x for x in d if x['state']=='CLOSED']))")

        # ── Fetch total deploys (pushes to main last 30 days) ─────
        SINCE=$(date -d '30 days ago' --iso-8601=seconds)
        TOTAL_DEPLOYS=$(git log --oneline --after="$SINCE" origin/main 2>/dev/null | wc -l)

        # ── Change Failure Rate ───────────────────────────────────
        if [ "$TOTAL_DEPLOYS" -gt 0 ]; then
          CFR=$(echo "scale=4; $TOTAL_INCIDENTS / $TOTAL_DEPLOYS * 100" | bc)
        else
          CFR="0"
        fi

        # ── MTTR (mean time to restore for closed incidents) ──────
        MTTR_HOURS=$(echo "$INCIDENTS" | python3 - << 'PYEOF'
import json, sys
from datetime import datetime, timezone

data = json.load(sys.stdin)
closed = [x for x in data if x.get('closedAt') and x.get('createdAt')]
if not closed:
    print("0")
else:
    fmt = "%Y-%m-%dT%H:%M:%SZ"
    durations = []
    for issue in closed:
        created = datetime.strptime(issue['createdAt'], fmt).replace(tzinfo=timezone.utc)
        closed_at = datetime.strptime(issue['closedAt'], fmt).replace(tzinfo=timezone.utc)
        durations.append((closed_at - created).total_seconds() / 3600)
    print(f"{sum(durations)/len(durations):.2f}")
PYEOF
)

        # ── CFR Rating ────────────────────────────────────────────
        CFR_RATING=$(python3 -c "
cfr = float('${CFR}')
if cfr <= 5: print('Elite (≤5%)')
elif cfr <= 10: print('High (≤10%)')
elif cfr <= 15: print('Medium (≤15%)')
else: print('Low (>15%)')
")

        # ── MTTR Rating ───────────────────────────────────────────
        MTTR_RATING=$(python3 -c "
h = float('${MTTR_HOURS}')
if h <= 1: print('Elite (< 1h)')
elif h <= 24: print('High (< 1 day)')
elif h <= 168: print('Medium (< 1 week)')
else: print('Low (> 1 week)')
")

        mkdir -p dora-artifacts
        cat > dora-artifacts/reliability-metrics.json << EOF
        {
          "timestamp": "$(date --iso-8601=seconds)",
          "repository": "$REPO",
          "dora": {
            "change_failure_rate": {
              "total_incidents_30d": $TOTAL_INCIDENTS,
              "total_deploys_30d": $TOTAL_DEPLOYS,
              "rate_percent": $CFR,
              "rating": "$CFR_RATING"
            },
            "mean_time_to_restore": {
              "hours": $MTTR_HOURS,
              "closed_incidents": $CLOSED_INCIDENTS,
              "rating": "$MTTR_RATING"
            }
          }
        }
        EOF

        echo "## DORA Metrics — Reliability" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value | Rating |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Change Failure Rate** | ${CFR}% (${TOTAL_INCIDENTS} incidents / ${TOTAL_DEPLOYS} deploys) | ${CFR_RATING} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Mean Time to Restore** | ${MTTR_HOURS} hours | ${MTTR_RATING} |" >> $GITHUB_STEP_SUMMARY

    - name: Upload reliability artifact
      uses: actions/upload-artifact@v4
      with:
        name: dora-reliability-metrics-${{ github.run_id }}
        path: dora-artifacts/
        retention-days: 90
