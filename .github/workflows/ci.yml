name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_otlp.txt
        pip install -r tests/requirements.txt

    - name: Run tests with coverage
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest --cov=wug_otlp_exporter --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Python Dependency Vulnerability Scan (pip-audit)
  # ─────────────────────────────────────────────────────────────
  audit-python:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit Python dependencies (main)
      run: |
        pip-audit -r requirements_otlp.txt \
          --format columns \
          --desc \
          --strict
      # --strict: exit code != 0 if any vulnerability is found (quality gate)

    - name: Audit Python dependencies (tests)
      run: |
        pip-audit -r tests/requirements.txt \
          --format columns \
          --desc \
          --strict

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Container Image Vulnerability Scan (Trivy - quality gate)
  # ─────────────────────────────────────────────────────────────
  scan-image:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write   # required to upload SARIF to GitHub Security tab

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t wug-otlp-exporter:${{ github.sha }} .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: wug-otlp-exporter:${{ github.sha }}
        format: table
        exit-code: '1'           # QUALITY GATE: fail pipeline on findings
        ignore-unfixed: true     # only report fixable vulnerabilities
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    - name: Run Trivy (SARIF output for GitHub Security tab)
      if: always()               # run even if the gate above failed
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: wug-otlp-exporter:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    - name: Upload Trivy SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif
        category: trivy
