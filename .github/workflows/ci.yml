name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # SonarCloud requires full git history for blame information
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_otlp.txt
        pip install -r tests/requirements.txt

    - name: Run tests with coverage
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest --cov=wug_otlp_exporter --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Upload coverage artifact for SonarCloud
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SonarCloud Quality Gate
  # Analyzes code quality, security hotspots, bugs, code smells
  # and coverage. Fails the pipeline if Quality Gate is not met.
  # Prerequisites:
  #   - Add SONAR_TOKEN secret in repository Settings > Secrets
  #   - Create project on https://sonarcloud.io (free for public repos)
  #   - Organization: mateusgsan | Project Key: mateusgsan_wug-otlp-exporter
  # ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history required for SonarCloud blame/new code detection

    - name: Download coverage report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # for PR decoration
        SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}    # SonarCloud authentication
      # sonar-project.properties in repo root drives all configuration.
      # sonar.qualitygate.wait=false to avoid NONE status on first analysis (Free plan)
      # Quality Gate is enforced in the next step via SonarCloud API.

    - name: Enforce Quality Gate via SonarCloud API
      # Polls the SonarCloud API to check overall code metrics.
      # On the Free plan, 'new code' metrics require a baseline; we check overall metrics instead.
      # Fails the pipeline if: bugs > 0, vulnerabilities > 0, security_hotspots_reviewed < 100%, coverage < 80%
      run: |
        echo "Checking SonarCloud Quality Gate status via API..."
        SONAR_RESPONSE=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
          "https://sonarcloud.io/api/measures/component?component=mateusgsan_wug-otlp-exporter&metricKeys=bugs,vulnerabilities,coverage,security_hotspots,security_hotspots_reviewed,code_smells,duplicated_lines_density")

        echo "$SONAR_RESPONSE" | python3 -c "
import json, sys
d = json.load(sys.stdin)
measures = {m['metric']: float(m.get('value', 0)) for m in d.get('component', {}).get('measures', [])}

bugs          = int(measures.get('bugs', 0))
vulns         = int(measures.get('vulnerabilities', 0))
coverage      = measures.get('coverage', 0.0)
hotspots      = int(measures.get('security_hotspots', 0))
reviewed_pct  = measures.get('security_hotspots_reviewed', 100.0) if hotspots > 0 else 100.0

print('--- SonarCloud Quality Gate (Overall Code) ---')
print(f'  Bugs:                  {bugs}  (threshold: 0)')
print(f'  Vulnerabilities:       {vulns}  (threshold: 0)')
print(f'  Coverage:              {coverage:.1f}%  (threshold: >= 80%)')
print(f'  Security Hotspots:     {hotspots}')
print(f'  Hotspots Reviewed:     {reviewed_pct:.0f}%  (threshold: 100%)')
print()

failed = []
if bugs > 0:           failed.append(f'BUGS: {bugs} (expected 0)')
if vulns > 0:          failed.append(f'VULNERABILITIES: {vulns} (expected 0)')
if coverage < 80.0:    failed.append(f'COVERAGE: {coverage:.1f}% (expected >= 80%)')
if reviewed_pct < 100: failed.append(f'HOTSPOTS_REVIEWED: {reviewed_pct:.0f}% (expected 100%)')

if failed:
    print('Quality Gate: FAILED')
    for f in failed: print(f'  - {f}')
    sys.exit(1)
else:
    print('Quality Gate: PASSED')
"

    - name: Write SonarCloud summary
      if: always()
      run: |
        SONAR_RESPONSE=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
          "https://sonarcloud.io/api/measures/component?component=mateusgsan_wug-otlp-exporter&metricKeys=bugs,vulnerabilities,coverage,security_hotspots,code_smells,duplicated_lines_density,reliability_rating,security_rating,sqale_rating,ncloc")
        BUGS=$(echo $SONAR_RESPONSE | python3 -c "import json,sys; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin)['component']['measures']}; print(m.get('bugs','N/A'))")
        VULNS=$(echo $SONAR_RESPONSE | python3 -c "import json,sys; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin)['component']['measures']}; print(m.get('vulnerabilities','N/A'))")
        COV=$(echo $SONAR_RESPONSE | python3 -c "import json,sys; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin)['component']['measures']}; print(m.get('coverage','N/A'))")
        SMELLS=$(echo $SONAR_RESPONSE | python3 -c "import json,sys; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin)['component']['measures']}; print(m.get('code_smells','N/A'))")
        NCLOC=$(echo $SONAR_RESPONSE | python3 -c "import json,sys; m={x['metric']:x.get('value','N/A') for x in json.load(sys.stdin)['component']['measures']}; print(m.get('ncloc','N/A'))")
        echo "## SonarCloud Quality Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value | Threshold |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :---: | :---: |" >> $GITHUB_STEP_SUMMARY
        echo "| Bugs | ${BUGS} | 0 |" >> $GITHUB_STEP_SUMMARY
        echo "| Vulnerabilities | ${VULNS} | 0 |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | ${COV}% | ≥ 80% |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Smells | ${SMELLS} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Lines of Code | ${NCLOC} | - |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Dashboard** | [View on SonarCloud](https://sonarcloud.io/project/overview?id=mateusgsan_wug-otlp-exporter) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Python Dependency Vulnerability Scan (pip-audit)
  # ─────────────────────────────────────────────────────────────
  audit-python:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit Python dependencies (main)
      run: |
        pip-audit -r requirements_otlp.txt \
          --format columns \
          --desc \
          --strict
      # --strict: exit code != 0 if any vulnerability is found (quality gate)

    - name: Audit Python dependencies (tests)
      run: |
        pip-audit -r tests/requirements.txt \
          --format columns \
          --desc \
          --strict

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Container Image Vulnerability Scan (Trivy - quality gate)
  # ─────────────────────────────────────────────────────────────
  scan-image:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write   # required to upload SARIF to GitHub Security tab

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t wug-otlp-exporter:${{ github.sha }} .

    - name: Install Trivy
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update && sudo apt-get install -y trivy
        trivy --version

    - name: Run Trivy vulnerability scanner
      run: |
        trivy image \
          --exit-code 1 \
          --ignore-unfixed \
          --ignorefile .trivyignore \
          --vuln-type os,library \
          --severity HIGH,CRITICAL \
          --format table \
          wug-otlp-exporter:${{ github.sha }}
      # exit-code 1 = QUALITY GATE: fail pipeline if HIGH/CRITICAL CVEs found

    - name: Run Trivy (SARIF output for GitHub Security tab)
      if: always()               # run even if the gate above failed
      run: |
        trivy image \
          --ignore-unfixed \
          --ignorefile .trivyignore \
          --vuln-type os,library \
          --severity HIGH,CRITICAL \
          --format sarif \
          --output trivy-results.sarif \
          wug-otlp-exporter:${{ github.sha }} || true

    - name: Upload Trivy SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
        category: trivy
