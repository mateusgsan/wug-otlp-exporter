name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # SonarCloud requires full git history for blame information
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_otlp.txt
        pip install -r tests/requirements.txt

    - name: Run tests with coverage
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest --cov=wug_otlp_exporter --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Upload coverage artifact for SonarCloud
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SonarCloud Quality Gate
  # Analyzes code quality, security hotspots, bugs, code smells
  # and coverage. Fails the pipeline if Quality Gate is not met.
  # Prerequisites:
  #   - Add SONAR_TOKEN secret in repository Settings > Secrets
  #   - Create project on https://sonarcloud.io (free for public repos)
  #   - Organization: mateusgsan | Project Key: mateusgsan_wug-otlp-exporter
  # ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history required for SonarCloud blame/new code detection

    - name: Download coverage report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # for PR decoration
        SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}    # SonarCloud authentication
      # sonar-project.properties in repo root drives all configuration.
      # sonar.qualitygate.wait=true (set in sonar-project.properties)
      # causes this step to fail if the Quality Gate is not passed.

    - name: Write SonarCloud summary
      if: always()
      run: |
        echo "## SonarCloud Quality Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Project** | [mateusgsan_wug-otlp-exporter](https://sonarcloud.io/project/overview?id=mateusgsan_wug-otlp-exporter) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Organization** | [mateusgsan](https://sonarcloud.io/organizations/mateusgsan) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Dashboard** | https://sonarcloud.io/project/overview?id=mateusgsan_wug-otlp-exporter |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> Quality Gate configured in \`sonar-project.properties\`. Requires 0 bugs, 0 vulnerabilities, 0 unreviewed security hotspots and ≥80% coverage on new code." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Python Dependency Vulnerability Scan (pip-audit)
  # ─────────────────────────────────────────────────────────────
  audit-python:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit Python dependencies (main)
      run: |
        pip-audit -r requirements_otlp.txt \
          --format columns \
          --desc \
          --strict
      # --strict: exit code != 0 if any vulnerability is found (quality gate)

    - name: Audit Python dependencies (tests)
      run: |
        pip-audit -r tests/requirements.txt \
          --format columns \
          --desc \
          --strict

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Container Image Vulnerability Scan (Trivy - quality gate)
  # ─────────────────────────────────────────────────────────────
  scan-image:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write   # required to upload SARIF to GitHub Security tab

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t wug-otlp-exporter:${{ github.sha }} .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: wug-otlp-exporter:${{ github.sha }}
        format: table
        exit-code: '1'           # QUALITY GATE: fail pipeline on findings
        ignore-unfixed: true     # only report fixable vulnerabilities
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    - name: Run Trivy (SARIF output for GitHub Security tab)
      if: always()               # run even if the gate above failed
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: wug-otlp-exporter:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'HIGH,CRITICAL'

    - name: Upload Trivy SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif
        category: trivy
